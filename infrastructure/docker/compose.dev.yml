name: local-wellness-dev

services:
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/api.Dockerfile
      target: development
    environment:
      NODE_ENV: development
      PORT: 3001
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:54321}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      GOVERNMENT_INVITE_REDIRECT_URL: ${GOVERNMENT_INVITE_REDIRECT_URL:-http://localhost:3003/auth/callback}
      API_ALLOWED_ORIGINS: ${API_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3003,http://localhost:3004}
      API_PRIVILEGED_MFA_MODE: ${API_PRIVILEGED_MFA_MODE:-observe}
      API_CITIZEN_PHONE_VERIFICATION_MODE: ${API_CITIZEN_PHONE_VERIFICATION_MODE:-}
      API_CITIZEN_PHONE_MFA_MODE: ${API_CITIZEN_PHONE_MFA_MODE:-observe}
    ports:
      - '${API_PORT:-3001}:3001'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    init: true
    stop_grace_period: 10s

  realtime-server:
    build:
      context: ../..
      dockerfile: infrastructure/docker/realtime-server.Dockerfile
      target: development
    environment:
      NODE_ENV: development
      PORT: 3002
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:54321}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      REALTIME_ALLOWED_ORIGINS: ${REALTIME_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3003,http://localhost:3004}
      REALTIME_DELIVERY_BATCH_SIZE: ${REALTIME_DELIVERY_BATCH_SIZE:-25}
      REALTIME_DELIVERY_LEASE_SECONDS: ${REALTIME_DELIVERY_LEASE_SECONDS:-30}
      REALTIME_DELIVERY_POLL_INTERVAL_MS: ${REALTIME_DELIVERY_POLL_INTERVAL_MS:-1000}
      REALTIME_EVENT_RATE_LIMIT_PER_MINUTE: ${REALTIME_EVENT_RATE_LIMIT_PER_MINUTE:-120}
      REALTIME_MAX_HTTP_BUFFER_SIZE_BYTES: ${REALTIME_MAX_HTTP_BUFFER_SIZE_BYTES:-65536}
      REALTIME_MAX_ROOMS_PER_SOCKET: ${REALTIME_MAX_ROOMS_PER_SOCKET:-32}
    ports:
      - '${REALTIME_PORT:-3002}:3002'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    init: true
    stop_grace_period: 10s

  workers:
    build:
      context: ../..
      dockerfile: infrastructure/docker/workers.Dockerfile
      target: development
    environment:
      NODE_ENV: development
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:54321}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      NOTIFICATION_WORKER_ID: ${NOTIFICATION_WORKER_ID:-notification-worker:compose}
      NOTIFICATION_BATCH_SIZE: ${NOTIFICATION_BATCH_SIZE:-25}
      NOTIFICATION_LEASE_SECONDS: ${NOTIFICATION_LEASE_SECONDS:-60}
      NOTIFICATION_POLL_INTERVAL_MS: ${NOTIFICATION_POLL_INTERVAL_MS:-1000}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    init: true
    stop_grace_period: 10s
