project_id = "local-wellness"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed/*.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[local_smtp]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "http://127.0.0.1:3000/auth/callback",
  "http://localhost:3000/auth/callback",
  "http://127.0.0.1:3003/auth/callback",
  "http://localhost:3003/auth/callback",
  "http://127.0.0.1:3004/auth/callback",
  "http://localhost:3004/auth/callback",
  "localwellness://auth/callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1m"
otp_length = 6
otp_expiry = 3600

[auth.email.template.invite]
subject = "You are invited to Local Wellness"
content_path = "./supabase/templates/invite.html"

[auth.sms]
enable_signup = true
enable_confirmations = false
template = "Your Local Wellness verification code is {{ .Code }}"
max_frequency = "1m"

# Local-only deterministic OTP. Never copy this mapping to a managed environment.
[auth.sms.test_otp]
12025550123 = "123456"

[functions.governance-sync-fetch]
verify_jwt = false
